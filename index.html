<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

        font-family: BricolageGrotesque-bold;
        src: url(./assets/fonts/Bricolage_Grotesque/static/BricolageGrotesque-Bold.ttf);
      }
      @font-face {
        font-family: DMSans-Medium;
        src: url(./assets/fonts/DM_Sans/static/DMSans-Medium.ttf);
      }
      @font-face {
        font-family: DMSans-SemiBoldItalic;
        src: url(./assets/fonts/DM_Sans/static/DMSans-SemiBoldItalic.ttf);
      }
      @font-face {
        font-family: DMSans-SemiBold;
        src: url(./assets/fonts/DM_Sans/static/DMSans-SemiBold.ttf);
      }
      @font-face {
        font-family: DMSans-Light;
        src: url(./assets/fonts/DM_Sans/static/DMSans-Light.ttf);
      }
      * {
        box-sizing: border-box;
      }
      body {
        background-color: hsl(243, 96%, 9%);
      }

      .logo-search-container {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        flex-wrap: wrap;
      }
      .logo {
        height: auto;
      }
      .units-div {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: space-evenly;
        align-items: center;
        height: auto;
        background-color: hsl(243, 23%, 24%);
        position: relative;
      }
      .units-div:hover {
        cursor: pointer;
      }
      .units-div .dropdown-arrow {
        height: auto;
      }
      .units-div img {
        height: auto;
      }
      .units-div label {
        font-family: DMSans-Medium;
        color: hsl(0, 0%, 100%);
      }
      .how-sky-div {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
      }
      h1 {
        font-family: BricolageGrotesque-bold;
        color: hsl(0, 0%, 100%);
        text-align: center;
      }

      .search-div {
        display: flex;
        flex-direction: column;
      }
      .search-input-div {
        background-color: hsl(243, 23%, 24%);
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
      }

      .search-input-div input {
        background-color: hsl(243, 23%, 24%);
        font-family: DMSans-SemiBold;
        border: solid 1px hsl(243, 23%, 24%);
        color: hsl(0, 0%, 100%);
      }
      .search-input-div input:hover {
        cursor: pointer;
      }
      ::placeholder {
        color: hsl(240, 6%, 70%);
        opacity: 1; /* Firefox */
      }

      ::-ms-input-placeholder {
        /* Edge 12 -18 */
        color: hsl(240, 6%, 70%);
      }

      .search-div button {
        background-color: hsl(233, 67%, 56%);
        color: hsl(0, 0%, 100%);
        font-family: DMSans-SemiBold;
        cursor: pointer;
      }
      .search-div button:hover {
        background-color: hsl(248, 70%, 36%);
        border: solid 1px hsl(248, 70%, 36%);
      }
      .no-search-result {
        display: none;
        position: relative;
        text-align: center;
        color: hsl(0, 0%, 100%);
        font-family: DMSans-SemiBold;
        z-index: 1;
      }
      .loading-state {
        display: none;
        flex-direction: column;
        z-index: 3;
        align-items: center;
        justify-content: center;
        background-color: hsl(243, 23%, 30%);
      }
      .loading-label {
        z-index: 4;
        color: hsl(0, 0%, 100%);
        font-family: DMSans-Light;
        background-color: hsl(243, 23%, 30%);
      }
      .today-small-div {
        display: flex;
        flex-direction: column;
        background-repeat: no-repeat;
        align-items: center;
        background-image: url("./assets/images/bg-today-small.svg");
      }
      .today-small-div-loading-state {
        display: flex;
        flex-direction: column;
        background-image: url("");
        background-color: hsl(243, 23%, 30%);
        align-items: center;

        display: flex;
        flex-direction: column;
        align-items: center;

        color: hsl(0, 0%, 100%);

        font-family: DMSans-Medium;
        color: hsl(250, 6%, 84%);
      }
      .today-icon-temp-div {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
      }

        color: hsl(0, 0%, 100%);

        flex-direction: column;
      }
      .today-other-row-div {

        flex-direction: row;
        justify-content: space-between;

        display: flex;
        flex-direction: column;
        background-color: hsl(243, 23%, 24%);

      .each-small-params-label {
        color: hsl(0, 0%, 100%);

    <script>
      let position_result,
        forecast_result,

        hourly_forecast_result;

      let daily_time,
        daily_max_temp,
        daily_min_temp,
        weather_code,
        hourly_time,
        hourly_temp,
        hourly_weather_code;

      const days_arr = [
        "Sunday",
        "Monday",
        "Tuesday",
        "Wednesday",
        "Thursday",
        "Friday",
        "Saturday",
      ];
      const months_arr = [
        "Jan",
        "Feb",
        "Mar",
        "Apr",
        "May",
        "Jun",
        "Jul",
        "Aug",
        "Sep",
        "Oct",
        "Nov",
        "Dec",
      ];

      const onLoad = () => {
        localStorage.setItem("unit", "metric");
        //  localStorage.removeItem("typedSearchWord");
        let savedSearchWord = localStorage.getItem("typedSearchWord");
        if (savedSearchWord === null) {
          localStorage.setItem("typedSearchWord", "");
          return;
        } else return;
      };
      const convertTZ = (date, timezone) => {
        return new Date(date.toLocaleString("en-US", { timeZone: timezone }));
      };
      const customTimeStr = (time) => {
        let date = time.getDate();
        let month = time.getMonth();
        let year = time.getFullYear();
        let day = time.getDay();
        let hour = time.getHours();

        return `${days_arr[day]}, ${months_arr[month]} ${date}, ${year}`;
      };
      const setWeatherIcon = (weather_code) => {
        let srcImg;
        switch (weather_code) {
          case 0:
            srcImg = "./assets/images/icon-sunny.webp";
            break;
          case 1:
            srcImg = "./assets/images/icon-sunny.webp";
            break;
          case 2:
            srcImg = "./assets/images/icon-partly-cloudy.webp";
            break;
          case 3:
            srcImg = "./assets/images/icon-overcast.webp";
            break;
          case 45:
            srcImg = "./assets/images/icon-fog.webp";
            break;
          case 48:
            srcImg = "./assets/images/icon-fog.webp";
            break;
          case 51:
            srcImg = "./assets/images/icon-drizzle.webp";
            break;
          case 53:
            srcImg = "./assets/images/icon-drizzle.webp";
            break;
          case 55:
            srcImg = "./assets/images/icon-drizzle.webp";
            break;
          case 61:
            srcImg = "./assets/images/icon-rain.webp";
            break;
          case 63:
            srcImg = "./assets/images/icon-rain.webp";
            break;
          case 65:
            srcImg = "./assets/images/icon-rain.webp";
            break;
          case 66:
            srcImg = "./assets/images/icon-rain.webp";
            break;
          case 67:
            srcImg = "./assets/images/icon-rain.webp";
            break;
          case 71:
            srcImg = "./assets/images/icon-snow.webp";
            break;
          case 73:
            srcImg = "./assets/images/icon-snow.webp";
            break;
          case 75:
            srcImg = "./assets/images/icon-snow.webp";
            break;
          case 77:
            srcImg = "./assets/images/icon-snow.webp";
            break;
          case 80:
            srcImg = "./assets/images/icon-rain.webp";
            break;
          case 81:
            srcImg = "./assets/images/icon-rain.webp";
            break;
          case 82:
            srcImg = "./assets/images/icon-rain.webp";
            break;
          case 85:
            srcImg = "./assets/images/icon-snow.webp";
            break;
          case 86:
            srcImg = "./assets/images/icon-snow.webp";
            break;
          case 95:
            srcImg = "./assets/images/icon-storm.webp";
            break;
          case 96:
            srcImg = "./assets/images/icon-storm.webp";
            break;
          case 99:
            srcImg = "./assets/images/icon-storm.webp";
            break;
          default:
            break;
        }
        return srcImg;
      };
      const selectDay = (event) => {
        let day_selected = event.target.id;
        document.getElementById("hours-in-day-main-div").innerHTML = ""; //clear all element under this parent id, can do refresh when choose different day
        document.getElementById(
          "day_label_in_hourly_forecast_select"
        ).innerText = day_selected;
        let start_index = 0;
        let end_index = 0;
        let num_hours_in_day = 24;
        let num_days_in_week = 7;
        let day_in_num;
        switch (day_selected) {
          case "Sunday":
            day_in_num = 0;
            break;
          case "Monday":
            day_in_num = 1;
            break;
          case "Tuesday":
            day_in_num = 2;
            break;
          case "Wednesday":
            day_in_num = 3;
            break;
          case "Thursday":
            day_in_num = 4;
            break;
          case "Friday":
            day_in_num = 5;
            break;
          case "Saturday":
            day_in_num = 6;
            break;
          default:
            break;
        }
        for (let j = start_index; j < num_days_in_week; j++) {
          let day_num = new Date(hourly_time[j * 24]).getDay();

          if (day_in_num === day_num) {
            for (let k = j * 24; k < j * 24 + 24; k++) {
              let each_hour_forecast = document.createElement("div");
              each_hour_forecast.classList.add("each-hour-in-day");
              let each_hour_weather_icon = document.createElement("img");
              each_hour_weather_icon.classList.add("each-hour-in-day-img");
              let each_hour_hour = document.createElement("label");
              each_hour_hour.classList.add("each-hour-in-day-time");
              let each_hour_temp = document.createElement("label");
              each_hour_temp.classList.add("each-hour-in-day-temp");
              each_hour_weather_icon.setAttribute(
                "src",
                setWeatherIcon(hourly_weather_code[k])
              );
              let ampm = "";
              let hour12 = new Date(hourly_time[k]).getHours();
              if (hour12 < 13) {
                ampm = "AM";
              } else {
                hour12 -= 12;
                ampm = "PM";
              }
              each_hour_hour.innerText = `${hour12} ${ampm}`;
              each_hour_temp.innerText = "";
              each_hour_temp.innerText = `${hourly_temp[k]}°`;
              each_hour_forecast.appendChild(each_hour_weather_icon);
              each_hour_forecast.appendChild(each_hour_hour);
              each_hour_forecast.appendChild(each_hour_temp);

              document
                .getElementById("hours-in-day-main-div")
                .appendChild(each_hour_forecast);
            }
            document.getElementById("drop-down-menu-days").style.display =
              "none";
            return;
          }
        }
      };

      const sendRequest = async (url) => {
        try {
          let response = await fetch(url);
          if (!response.ok) {
            throw new Error(`Response status: ${response.status}`);
          }
          return await response.json(); //get latitude & longitude
        } catch (err) {
          console.log(err);
        }
      };

      const createDailyWeatherElements = (parentId, item, index, divclass) => {
        //small div elements in Daily forecast
        const daily_time_div = document.createElement("div");
        daily_time_div.setAttribute("id", `daily-forecast-day-${index}`);
        daily_time_div.classList.add(divclass);

        const daily_day_label = document.createElement("label");
        daily_day_label.classList.add("each-day-label");
        let day = customTimeStr(new Date(item)).split(",");
        daily_day_label.innerText = day[0].substring(0, 3);

        const each_day_max_min_div = document.createElement("div");
        each_day_max_min_div.classList.add("each-day-max-min");

        const day_max_temp = document.createElement("label");
        const day_min_temp = document.createElement("label");
        day_max_temp.classList.add("each-day-max");
        day_min_temp.classList.add("each-day-min");
        day_max_temp.innerText = `${daily_max_temp[index]}°`;
        day_min_temp.innerText = `${daily_min_temp[index]}°`;

        const weather_icon = document.createElement("img");
        weather_icon.setAttribute("src", setWeatherIcon(weather_code[index]));
        weather_icon.classList.add("each-day-img");

        daily_time_div.appendChild(daily_day_label);
        daily_time_div.appendChild(weather_icon);
        each_day_max_min_div.appendChild(day_max_temp);
        each_day_max_min_div.appendChild(day_min_temp);
        daily_time_div.appendChild(each_day_max_min_div);
        parentId.appendChild(daily_time_div);
      };

      const createDailyWeatherBlankElements = (parentId, index, divclass) => {
        //small div elements in Daily forecast
        const daily_time_div = document.createElement("div");
        daily_time_div.setAttribute("id", `daily-forecast-day-${index}`);
        daily_time_div.classList.add(divclass);

        const daily_day_label = document.createElement("label");
        daily_day_label.classList.add("each-day-label");
        daily_day_label.innerText = "";

        const each_day_max_min_div = document.createElement("div");
        each_day_max_min_div.classList.add("each-day-max-min");

        const day_max_temp = document.createElement("label");
        const day_min_temp = document.createElement("label");
        day_max_temp.classList.add("each-day-max");
        day_min_temp.classList.add("each-day-min");
        day_max_temp.innerText = "";
        day_min_temp.innerText = "";

        const weather_icon = document.createElement("img");
        weather_icon.setAttribute("src", "");
        weather_icon.classList.add("each-day-img");

        daily_time_div.appendChild(daily_day_label);
        daily_time_div.appendChild(weather_icon);
        each_day_max_min_div.appendChild(day_max_temp);
        each_day_max_min_div.appendChild(day_min_temp);
        daily_time_div.appendChild(each_day_max_min_div);
        parentId.appendChild(daily_time_div);
      };

      const createDailyWeatherBlankCard = () => {
        let daily_forecast_div_row1 = document.getElementById(
          "daily-forecast-days-div-row1"
        );
        let daily_forecast_div_row2 = document.getElementById(
          "daily-forecast-days-div-row2"
        );
        let daily_forecast_div_row3 = document.getElementById(
          "daily-forecast-days-div-row3"
        );
        daily_forecast_div_row1.innerHTML = "";
        daily_forecast_div_row2.innerHTML = "";
        daily_forecast_div_row3.innerHTML = "";
        document.getElementById("hours-in-day-main-div").innerHTML = "";

        for (let j = 0; j < 3; j++) {
          createDailyWeatherBlankElements(
            daily_forecast_div_row1,
            j,
            "daily-forecast-day"
          );
        }

        for (let j = 3; j < 6; j++) {
          createDailyWeatherBlankElements(
            daily_forecast_div_row2,
            j,
            "daily-forecast-day"
          );
        }
        for (let j = 6; j < 7; j++) {
          createDailyWeatherBlankElements(
            daily_forecast_div_row3,
            j,
            "daily-forecast-last-day"
          );
        }
      };
      const createDailyWeatherCard = () => {
        let daily_forecast_div_row1 = document.getElementById(
          "daily-forecast-days-div-row1"
        );
        let daily_forecast_div_row2 = document.getElementById(
          "daily-forecast-days-div-row2"
        );
        let daily_forecast_div_row3 = document.getElementById(
          "daily-forecast-days-div-row3"
        );

        daily_forecast_div_row1.innerHTML = "";
        daily_forecast_div_row2.innerHTML = "";
        daily_forecast_div_row3.innerHTML = "";
        document.getElementById("hours-in-day-main-div").innerHTML = "";

        for (let j = 0; j < 3; j++) {
          createDailyWeatherElements(
            daily_forecast_div_row1,
            daily_time[j],
            j,
            "daily-forecast-day"
          );
        }

        for (let j = 3; j < 6; j++) {
          createDailyWeatherElements(
            daily_forecast_div_row2,
            daily_time[j],
            j,
            "daily-forecast-day"
          );
        }
        for (let j = 6; j < 7; j++) {
          createDailyWeatherElements(
            daily_forecast_div_row3,
            daily_time[j],
            j,
            "daily-forecast-last-day"
          );
        }
      };
      //Request to API Open-Meteo.com
      //---------------------------------------------------------------------------------------------------------------------
      const callAPIReq = async (city) => {
        //get latitude & longitude for city
        position_result = await sendRequest(
          `https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1&language=en&format=json`
        );

        //current forecast API based on latitude & longitude above, timezone auto
        if (localStorage.getItem("unit") === "metric") {
          forecast_result = await sendRequest(
            `https://api.open-meteo.com/v1/forecast?latitude=${position_result.results[0].latitude}&longitude=${position_result.results[0].longitude}&current=temperature_2m,relative_humidity_2m,apparent_temperature,wind_speed_10m,precipitation,is_day,rain,showers,snowfall,weather_code,cloud_cover,pressure_msl,surface_pressure,wind_direction_10m,wind_gusts_10m`
          );
        } else if (localStorage.getItem("unit") === "imperial") {
          forecast_result = await sendRequest(
            `https://api.open-meteo.com/v1/forecast?latitude=${position_result.results[0].latitude}&longitude=${position_result.results[0].longitude}&current=temperature_2m,relative_humidity_2m,apparent_temperature,wind_speed_10m,precipitation,is_day,rain,showers,snowfall,weather_code,cloud_cover,pressure_msl,surface_pressure,wind_direction_10m,wind_gusts_10m&wind_speed_unit=mph&temperature_unit=fahrenheit&precipitation_unit=inch`
          );
        }

        console.log(forecast_result);
        //daily forecast API based on latitude & longitude above, timezone auto
        if (localStorage.getItem("unit") === "metric") {
          daily_forecast_result = await sendRequest(
            `https://api.open-meteo.com/v1/forecast?latitude=${position_result.results[0].latitude}&longitude=${position_result.results[0].longitude}&daily=weather_code,temperature_2m_max,temperature_2m_min`
          ); //forecast result
        } else if (localStorage.getItem("unit") === "imperial") {
          daily_forecast_result = await sendRequest(
            `https://api.open-meteo.com/v1/forecast?latitude=${position_result.results[0].latitude}&longitude=${position_result.results[0].longitude}&daily=weather_code,temperature_2m_max,temperature_2m_min&wind_speed_unit=mph&temperature_unit=fahrenheit&precipitation_unit=inch`
          ); //forecast result
        }

        console.log(daily_forecast_result);
        //hourly forecast API based on latitude & longitude above, timezone auto
        if (localStorage.getItem("unit") === "metric") {
          hourly_forecast_result = await sendRequest(
            `https://api.open-meteo.com/v1/forecast?latitude=${position_result.results[0].latitude}&longitude=${position_result.results[0].longitude}&hourly=temperature_2m,weather_code`
          ); //forecast result
        } else if (localStorage.getItem("unit") === "imperial") {
          hourly_forecast_result = await sendRequest(
            `https://api.open-meteo.com/v1/forecast?latitude=${position_result.results[0].latitude}&longitude=${position_result.results[0].longitude}&hourly=temperature_2m,weather_code&wind_speed_unit=mph&temperature_unit=fahrenheit&precipitation_unit=inch`
          ); //forecast result
        }
        console.log(hourly_forecast_result);

        if (!position_result) {
          document.getElementById("loading-state").style.display = "flex";
          document
            .getElementById("today-small-div")
            .classList.add("today-small-div-loading-state");
          document
            .getElementById("today-small-div")
            .classList.remove("today-small-div");
          document.getElementById("city-time-div").style.display = "none";
          document.getElementById("today-icon-temp-div").style.display = "none";
        } else {
          document.getElementById("loading-state").style.display = "none";
          document
            .getElementById("today-small-div")
            .classList.remove("today-small-div-loading-state");
          document
            .getElementById("today-small-div")
            .classList.add("today-small-div");
          document.getElementById("city-time-div").style.display = "flex";
          document.getElementById("today-icon-temp-div").style.display = "flex";
        }
      };

      const storeCity = () => {
        if (document.getElementById("city").value != "") {
          let searchWord = localStorage.getItem("typedSearchWord");
          searchWord = searchWord + "," + document.getElementById("city").value;
          localStorage.setItem("typedSearchWord", searchWord);
          let arr_sw = localStorage.getItem("typedSearchWord").split(",");
          if (arr_sw.length > 5) {
            localStorage.removeItem("typedSearchWord");
            localStorage.setItem(
              "typedSearchWord",
              document.getElementById("city").value || ""
            );
          }
        } else return;
      };

      const search = async () => {
        //display when in loading state
        document.getElementById("loading-state").style.display = "flex"; //display loading state icon
        document
          .getElementById("today-small-div")
          .classList.remove("today-small-div");
        document
          .getElementById("today-small-div")
          .classList.add("today-small-div-loading-state");
        document.getElementById("city-time-div").style.display = "none";
        document.getElementById("today-icon-temp-div").style.display = "none";
        document.getElementById("feels-like").innerText = "-";
        document.getElementById("current-humid").innerText = "-";
        document.getElementById("current-wind-speed").innerText = "-";
        document.getElementById("current-precipitation").innerText = "-";

        createDailyWeatherBlankCard();
        try {
          await callAPIReq(document.getElementById("city").value);
          //fill-in responses from current weather forecast API into DOM element
          //---------------------------------------------------------------------------------------------------------------------------------
          document.getElementById(
            "city-name"
          ).innerText = `${position_result.results[0].name},${position_result.results[0].country} `;
          document.getElementById(
            "current-temp"
          ).innerText = `${forecast_result.current.temperature_2m}°`;
          document.getElementById(
            "current-humid"
          ).innerText = `${forecast_result.current.relative_humidity_2m} ${forecast_result.current_units.relative_humidity_2m}`;
          document.getElementById("current-time").innerText = customTimeStr(
            new Date(forecast_result.current.time)
          );
          document.getElementById(
            "feels-like"
          ).innerText = `${forecast_result.current.apparent_temperature} ${forecast_result.current_units.apparent_temperature}`;
          document.getElementById(
            "current-wind-speed"
          ).innerText = `${forecast_result.current.wind_speed_10m} ${forecast_result.current_units.wind_speed_10m}`;
          document.getElementById(
            "current-precipitation"
          ).innerText = `${forecast_result.current.precipitation} ${forecast_result.current_units.precipitation}`;

          document.getElementById("current-weather-icon").src = setWeatherIcon(
            forecast_result.current.weather_code
          );
          //put results from above API request into arrays
          //-------------------------------------------------------------------------------------------------------------------------------
          daily_time = [...daily_forecast_result.daily.time];
          daily_max_temp = [...daily_forecast_result.daily.temperature_2m_max];
          daily_min_temp = [...daily_forecast_result.daily.temperature_2m_min];
          weather_code = [...daily_forecast_result.daily.weather_code];

          hourly_time = [...hourly_forecast_result.hourly.time];
          hourly_temp = [...hourly_forecast_result.hourly.temperature_2m];
          hourly_weather_code = [...hourly_forecast_result.hourly.weather_code];
          //---------------------------------------------------------------------------------------------------------------------------------
          //fill-in responses from daily weather forecast API into DOM element
          //---------------------------------------------------------------------------------------------------------------------------------

          createDailyWeatherCard();

          document.getElementById("display-weather-results").style.display =
            "block";
          document.getElementById("no-search-result").style.display = "none";
        } catch (error) {
          document.getElementById("display-weather-results").style.display =
            "none";
          document.getElementById("no-search-result").style.display = "block";
        }

        //hourly forecast for current day
        let start_index = 0;
        let end_index = 0;
        let num_hours_in_day = 24;
        let num_days_in_week = 7;
        let day_in_num;

        day_in_num = new Date(Date.now()).getDay();

        document.getElementById(
          "day_label_in_hourly_forecast_select"
        ).innerText = days_arr[day_in_num];

        for (let j = start_index; j < num_days_in_week; j++) {
          let day_num = new Date(hourly_time[j * 24]).getDay();

          if (day_in_num === day_num) {
            for (let k = j * 24; k < j * 24 + 24; k++) {
              let each_hour_forecast = document.createElement("div");
              each_hour_forecast.classList.add("each-hour-in-day");
              let each_hour_weather_icon = document.createElement("img");
              each_hour_weather_icon.classList.add("each-hour-in-day-img");
              let each_hour_hour = document.createElement("label");
              each_hour_hour.classList.add("each-hour-in-day-time");
              let each_hour_temp = document.createElement("label");
              each_hour_temp.classList.add("each-hour-in-day-temp");
              each_hour_weather_icon.setAttribute(
                "src",
                setWeatherIcon(hourly_weather_code[k])
              );
              let ampm = "";
              let hour12 = new Date(hourly_time[k]).getHours();
              if (hour12 < 13) {
                ampm = "AM";
              } else {
                hour12 -= 12;
                ampm = "PM";
              }
              each_hour_hour.innerText = `${hour12} ${ampm}`;
              each_hour_temp.innerText = "";
              each_hour_temp.innerText = `${hourly_temp[k]}°`;
              each_hour_forecast.appendChild(each_hour_weather_icon);
              each_hour_forecast.appendChild(each_hour_hour);
              each_hour_forecast.appendChild(each_hour_temp);

              document
                .getElementById("hours-in-day-main-div")
                .appendChild(each_hour_forecast);
            }
            document.getElementById("drop-down-menu-days").style.display =
              "none";
            return;
          }
        }
      };

      //choose typed search word

      const showTypedSearchWord = () => {
        let ddsearchword = document.getElementById("drop-down-search-word-div");
        let ddsearchword_inside = document.getElementById(
          "drop-down-search-word-div-inside"
        );
        ddsearchword_inside.innerHTML = "";
        let tempLS = localStorage.getItem("typedSearchWord");
        let listCitiesName = tempLS.split(",");
        for (let j = 0; j < listCitiesName.length; j++) {
          let city_row_div = document.createElement("div");
          city_row_div.innerText = listCitiesName[j];
          city_row_div.classList.add("city-name-row-div");
          city_row_div.setAttribute("id", `city${j}`);
          city_row_div.addEventListener("click", function selectCity(event) {
            let idElement = event.target.id;
            let choosedCity = document.getElementById(`${idElement}`).innerHTML;
            document.getElementById("city").value = choosedCity;
            document.getElementById("drop-down-search-word-div").style.display =
              "none";
          });
          ddsearchword_inside.appendChild(city_row_div);
        }
        ddsearchword.appendChild(ddsearchword_inside);
        if (ddsearchword.style.display === "none") {
          ddsearchword.style.display = "block";
        } else {
          ddsearchword.style.display = "none";
        }
      };
      //choose days
      const showDropDownDays = () => {
        let dddays = document.getElementById("drop-down-menu-days");
        if (dddays.style.display === "none") {
          dddays.style.display = "block";
        } else {
          dddays.style.display = "none";
        }
      };

      //choose unit
      const showDropDownUnit = () => {
        let ddmenu = document.getElementById("drop-down-menu-div");

        if (ddmenu.style.display === "none") {
          ddmenu.style.display = "block";
        } else {
          ddmenu.style.display = "none";
        }

        if (localStorage.getItem("unit") === "metric") {
          switch_li.innerText = "Switch to Imperial";
          document.getElementById("celcius").classList.add("active-unit");
          document.getElementById("kmh").classList.add("active-unit");
          document.getElementById("mm").classList.add("active-unit");
          document.getElementById("fahrenheit").classList.remove("active-unit");
          document.getElementById("mph").classList.remove("active-unit");
          document.getElementById("inch").classList.remove("active-unit");
          document.getElementById(
            "fahrenheit"
          ).lastElementChild.style.visibility = "hidden";
          document.getElementById("mph").lastElementChild.style.visibility =
            "hidden";
          document.getElementById("inch").lastElementChild.style.visibility =
            "hidden";
          document.getElementById("celcius").lastElementChild.style.visibility =
            "visible";
          document.getElementById("kmh").lastElementChild.style.visibility =
            "visible";
          document.getElementById("mm").lastElementChild.style.visibility =
            "visible";
          return;
        } else if (localStorage.getItem("unit") === "imperial") {
          switch_li.innerText = "Switch to Metric";
          document.getElementById("fahrenheit").classList.add("active-unit");
          document.getElementById("mph").classList.add("active-unit");
          document.getElementById("inch").classList.add("active-unit");
          document.getElementById("celcius").classList.remove("active-unit");
          document.getElementById("kmh").classList.remove("active-unit");
          document.getElementById("mm").classList.remove("active-unit");
          document.getElementById(
            "fahrenheit"
          ).lastElementChild.style.visibility = "visible";
          document.getElementById("mph").lastElementChild.style.visibility =
            "visible";
          document.getElementById("inch").lastElementChild.style.visibility =
            "visible";
          document.getElementById("celcius").lastElementChild.style.visibility =
            "hidden";
          document.getElementById("kmh").lastElementChild.style.visibility =
            "hidden";
          document.getElementById("mm").lastElementChild.style.visibility =
            "hidden";
          return;
        }
      };
      const switchUnit = () => {
        let switch_li = document.getElementById("switch_li");

        if (localStorage.getItem("unit") === "metric") {
          localStorage.setItem("unit", "imperial");
          search();
          switch_li.innerText = "Switch to Metric";
          document.getElementById("fahrenheit").classList.add("active-unit");
          document.getElementById("mph").classList.add("active-unit");
          document.getElementById("inch").classList.add("active-unit");
          document.getElementById("celcius").classList.remove("active-unit");
          document.getElementById("kmh").classList.remove("active-unit");
          document.getElementById("mm").classList.remove("active-unit");
          document.getElementById(
            "fahrenheit"
          ).lastElementChild.style.visibility = "visible";
          document.getElementById("mph").lastElementChild.style.visibility =
            "visible";
          document.getElementById("inch").lastElementChild.style.visibility =
            "visible";
          document.getElementById("celcius").lastElementChild.style.visibility =
            "hidden";
          document.getElementById("kmh").lastElementChild.style.visibility =
            "hidden";
          document.getElementById("mm").lastElementChild.style.visibility =
            "hidden";

          document.getElementById("drop-down-menu-div").style.display = "none";
          return;
        } else if (localStorage.getItem("unit") === "imperial") {
          localStorage.setItem("unit", "metric");
          search();
          switch_li.innerText = "Switch to Imperial";
          document.getElementById("celcius").classList.add("active-unit");
          document.getElementById("kmh").classList.add("active-unit");
          document.getElementById("mm").classList.add("active-unit");
          document.getElementById("fahrenheit").classList.remove("active-unit");
          document.getElementById("mph").classList.remove("active-unit");
          document.getElementById("inch").classList.remove("active-unit");
          document.getElementById(
            "fahrenheit"
          ).lastElementChild.style.visibility = "hidden";
          document.getElementById("mph").lastElementChild.style.visibility =
            "hidden";
          document.getElementById("inch").lastElementChild.style.visibility =
            "hidden";
          document.getElementById("celcius").lastElementChild.style.visibility =
            "visible";
          document.getElementById("kmh").lastElementChild.style.visibility =
            "visible";
          document.getElementById("mm").lastElementChild.style.visibility =
            "visible";
          document.getElementById("drop-down-menu-div").style.display = "none";
          return;
        }
      };
    </script>
  </body>
